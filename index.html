<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1NK | Industrial-Grade AI</title>
    <!-- Подключаем строгий геометрический шрифт -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500;800&display=swap" rel="stylesheet">
    
    <style>
        /* Базовые настройки для эффекта премиальности */
        :root {
            --bg-color: #000000;
            --text-color: #f5f5f7; /* Цвет текста как у Apple (не чисто белый) */
            --muted-color: #6e6e73;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Manrope', -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased; /* Делает шрифты тоньше и резче */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Пока блокируем скролл для идеального первого экрана */
        }

        /* Минималистичная навигация */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2.5rem 4rem;
            opacity: 0;
            animation: fadeUp 1.5s 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .menu-links {
            display: flex;
            gap: 3rem;
        }

        .menu-links a {
            color: var(--muted-color);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .menu-links a:hover {
            color: var(--text-color);
        }

        /* Центрированный контент главного экрана */
        .hero {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 2rem;
        }

        /* Огромный, дерзкий заголовок */
        h1 {
            font-size: clamp(3rem, 8vw, 8rem);
            font-weight: 800;
            line-height: 1;
            letter-spacing: -3px;
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeUp 1.5s 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        h1 .muted {
            color: var(--muted-color);
        }

        /* Подзаголовок, подчеркивающий статус */
        p {
            font-size: clamp(1rem, 1.5vw, 1.5rem);
            font-weight: 300;
            color: var(--muted-color);
            max-width: 600px;
            line-height: 1.5;
            margin-bottom: 4rem;
            opacity: 0;
            animation: fadeUp 1.5s 1.1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Кнопка действия (CTA) - без рамок, только текст и подчеркивание при наведении */
        .btn-cta {
            color: var(--text-color);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            border-bottom: 1px solid transparent;
            padding-bottom: 4px;
            transition: border-color 0.3s ease;
            opacity: 0;
            animation: fadeUp 1.5s 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .btn-cta:hover {
            border-bottom: 1px solid var(--text-color);
        }

        /* Ключевая анимация: появление снизу с эффектом замедления (Apple-style) */
        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <!-- Навигация -->
    <nav>
        <div class="logo">1NK.</div>
        <div class="menu-links">
            <a href="#">Architecture</a>
            <a href="#">Ecosystem</a>
            <a href="#">Initiate</a>
        </div>
    </nav>

    <!-- Главный экран -->
    <section class="hero">
        <h1>ADAPT.<br><span class="muted">OR PERISH.</span></h1>
        <p>Industrial-grade AI automation. We engineer the infrastructure that makes your competitors obsolete.</p>
        <a href="#" class="btn-cta">Deploy the system &rarr;</a>
    </section>

</body>
</html>
